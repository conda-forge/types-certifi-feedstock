{% set name = "types-certifi" %}
{% set version = "2021.10.8.3" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/types-certifi-{{ version }}.tar.gz
  sha256: 72cf7798d165bc0b76e1c10dd1ea3097c7063c42c21d664523b928e88b554a4f

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  commands:
    - test -f $SP_DIR/certifi-stubs/__init__.pyi


about:
  home: https://github.com/python/typeshed
  summary: Typing stubs for certifi
  license: Apache-2.0 AND MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fhoehle
    - conda-forge/mypy
